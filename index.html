<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>INCEPTUM</title>

  <style>
body {
  margin: 0;
  font-family: sans-serif;
}

/* HERO */
.hero {
  width: 100%;
  background: white;
  border-bottom: 3px solid black;
  padding: 30px 0;
  text-align: center;
}

.hero-logo {
  width: 50%;
  height: 200px;
  margin: 0 auto;
  background-image: url('IMAGES/LOGO iNCEPTUM.png');
  background-size: 100% 120%;
  background-position: center -10%;
  background-repeat: no-repeat;
}

/* POP-UP ČTVEREC */
.square {
  width: 250px;
  height: 250px;
  margin: 40px auto;
  border: 3px solid black;
  background-image: url('IMAGES/LOGO PPSK FIN.png');
  background-size: 100% 120%;
  background-position: center -10%;
  background-repeat: no-repeat;
  transition: transform 0.2s ease;
}

.square:hover {
  transform: scale(1.05);
}
  </style>
</head>

<body>

<!-- HERO -->
<div class="hero">
  <div class="hero-logo"></div>
</div>

<!-- POP-UP ČTVEREC → odkaz na stránku s mp4+pdf -->
<a href="media.html">
  <div class="square"></div>
</a>

</body>
</html>
