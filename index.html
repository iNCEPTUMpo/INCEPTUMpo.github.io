<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Můj web</title>

  <style>
@font-face {
    font-family: 'AgencyFB';
    src: url('AGENCY FB.ttf') format('truetype');
    font-weight: normal;
    font-style: normal;
}

body {
    font-family: 'AgencyFB', sans-serif;
    margin: 0;
}

/* HERO – bílý pruh s černou linkou dole */
.hero-bar {
  width: 100%;
  background-color: white;
  border-bottom: 3px solid black;
  padding: 30px 0;
  text-align: center;
}

/* HERO LOGO – 50 % šířky, pevná výška, stejný ořez 10 % nahoře/dole */
.hero-logo {
  width: 50%;
  height: 200px;                 /* výška hero obrázku */
  margin: 0 auto;
  background-image: url('IMAGES/LOGO iNCEPTUM.png');
  background-size: 100% 120%;    /* +20 % → 10 % nahoře + 10 % dole pryč */
  background-position: center -10%;
  background-repeat: no-repeat;
}

/* ČTVERCOVÝ OBRÁZEK POD HERO */
.square-link {
  display: block;
  width: 250px;
  height: 250px;
  margin: 40px auto;
  text-decoration: none;
}

.square-crop {
  width: 100%;
  height: 100%;
  background-image: url('IMAGES/LOGO iNCEPTUM.png');
  background-size: 100% 120%;     /* stejný ořez jako hero */
  background-position: center -10%;
  background-repeat: no-repeat;
  border: 3px solid black;
  transition: transform 0.2s ease;
}

.square-crop:hover {
  transform: scale(1.05);
}
  </style>
</head>

<body>

<!-- HERO -->
<div class="hero-bar">
  <div class="hero-logo"></div>
</div>

<!-- ČTVERCOVÝ OBRÁZEK POD HERO -->
<a href="IMAGES/" class="square-link">
  <div class="square-crop"></div>
</a>

<h1>Ahoj světe!</h1>
<p>Můj web na GitHub Pages.</p>

</body>
</html>
