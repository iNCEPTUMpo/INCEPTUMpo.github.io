<!DOCTYPE html>
<html>
<head>
  <style>
@font-face {
    font-family: 'AgencyFB';
    src: url('AGENCY FB.ttf') format('truetype');
    font-weight: normal;
    font-style: normal;
}

body {
    font-family: 'AgencyFB', sans-serif;
    margin: 0;
}

/* HERO – bílý pruh s černou linkou dole */
.hero-bar {
  width: 100%;
  background-color: white;
  border-bottom: 3px solid black;
  padding: 20px 0;
  text-align: center;
}

/* Logo uvnitř – 50 % šířky, stejný ořez jako dole */
.hero-crop {
  width: 50%;
  aspect-ratio: 1 / 1;              /* čtverec */
  margin: 0 auto;
  background-image: url('IMAGES/LOGO iNCEPTUM.png');
  background-size: 100% 120%;       /* +20 % výšky → 10 % nahoře + 10 % dole pryč */
  background-position: center -10%; /* stejné posunutí jako u čtverce */
  background-repeat: no-repeat;
}
  </style>

  <meta charset="UTF-8">
  <title>Můj web</title>
</head>
<body>

<div class="hero-bar">
  <div class="hero-crop"></div>
</div>

<h1>Ahoj světe!</h1>
<p>Můj web na GitHub Pages.</p>

</body>
</html>
